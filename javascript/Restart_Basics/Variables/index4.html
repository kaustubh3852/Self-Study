<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript</title>
</head>
<body>
    <h1>JavaScript Hoisting</h1>
    <p>With var, you can use a variable before it is declared</p>
    <p id="demo"></p>

    <script>
        carName = "Volvo";
        document.getElementById('demo').innerHTML = carName;
        var carName;
    </script>
</body>
</html>
