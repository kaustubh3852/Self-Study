<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript</title>
</head>
<body>
    <h2>JavaScript const</h2>
    <p>Declaring a constant object does NOT make the object properties unchangeable</p>
    <p id="demo"></p>

    <script>
        // Create an Object
        const car = {type: "Fiat", model: "500", color: "White"};
        // Change a property
        car.color = "red";

        // Add a property
        car.owner = "Johnson";
        document.getElementById('demo').innerHTML =  "Car owner is " + car.owner;
    </script>
</body>
</html>
