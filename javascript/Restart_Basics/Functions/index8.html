<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript</title>
</head>
<body>
    <h1>JavaScript Functions</h1>
    <p>You can call functions from other functions</p>
    <p id="demo"></p>

    <script>
        function sayHello() {
            return "Hello World";
        }
        function showHello() {
            document.getElementById('demo').innerHTML = sayHello();
        }

        showHello();
    </script>
</body>
</html>
