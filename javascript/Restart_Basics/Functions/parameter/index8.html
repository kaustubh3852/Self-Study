<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript</title>
</head>
<body>
    <h1>javaScript Function</h1>
    <h2>The return Statement</h2>
    <p>A functon that returns computed value:</p>
    <p id="demo"></p>

    <script>
        function multiply(a,b) {
            return a * b; 
        }

        let result = multiply(3,4) * 5;
        document.getElementById('demo').innerHTML = result;
    </script>
</body>
</html>
