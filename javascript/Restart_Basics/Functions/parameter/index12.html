<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript</title>
</head>
<body>
    <h1>JavaScript Functions</h1>
    <p>The order of arguments matter</p>
    
    <script>
        function subtract(a,b) {
            return a-b;
        }

        let result = subtract(10,5);
        let result2 = subtract(5,10);
        console.log(result + " and " + result2);
    </script>
</body>
</html>
