<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript</title>
</head>
<body>
    <script>
        function sumAll() {
            let sum = 0;
            for(let i=0; i<arguments.length; i++) {
                sum += arguments[i];
            }
            return sum;
        }
        console.log(sumAll(4,2,6));
    </script>
</body>
</html>
