<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript</title>
</head>
<body>
    <h2>JavaScript Functions</h2>
    <p>Finding the largest number</p>
    <p id="demo"></p>

    <script>
        function findMax() {
            let max = -Infinity;
            for(let i=0; i<arguments.length; i++) {
                if(arguments[i] > max) {
                    max = arguments[i];
                }
            }
            return max;
        }

        console.log(findMax(3,4,5));
    </script>
</body>
</html>
