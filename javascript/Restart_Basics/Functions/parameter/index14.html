<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript</title>
</head>
<body>
    <p>Setting a default value to a function parameter</p>
    <script>
        function myFunction(x,y) {
            if(y == undefined) {
                y = 2;
            }
            return x * y;
        }

        console.log(myFunction(4));
    </script>
</body>
</html>
