<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript</title>
</head>
<body>
    <h1>javaScript Functions</h1>
    <p>A function can be used many times</p>
    <p id="demo"></p>

    <script>
        function add(a, b) {
            return a + b;
        }
        let sum1 = add(3,4);
        let sum2 = add(2,5);
        document.getElementById('demo').innerHTML = sum1 + " and " + sum2;
    </script>
</body>
</html>
