<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript</title>
</head>
<body>
    <h1>JavaScript Function</h1>
    <p>You can display the retured value using HTML </p>
    <p id="demo"></p>

    <script>
        function sayHello() {
            return "Hello World";
        }

        document.getElementById('demo').innerHTML = sayHello();
    </script>
</body>
</html>
